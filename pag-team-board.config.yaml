    - Story
    - Technical Story
    - Bug
    - Sub-task
    - Dev Bug (Sub-task)
  defaults:
    client_id: "0000"
    assignee:
      name: Hongjian Zhao
      account_id: "712020:1683110c-d149-4ca7-a0ad-03ed10597e96"
      role: Team Lead
  issue_structure_file: pag-ticket-issue-structures.yaml
  policy:
    require_epic: false
    require_sprint: false
    require_labels: false
    require_components: false
    default_assignee: Hongjian Zhao
    default_assignee_account_id: "712020:1683110c-d149-4ca7-a0ad-03ed10597e96"
    default_components: []
    default_sprint: ""
    default_labels: []
    default_parent: ""

board_filter:
  issue_types:
    - Story
    - Technical Story
    - Bug
    - Sub-task
    - Dev Bug (Sub-task)
  assignee_account_ids:
    - "712020:1683110c-d149-4ca7-a0ad-03ed10597e96"
    - "712020:c3a41fa6-5c83-460a-80ca-a50827135ce5"
    - "712020:4d3c5575-206d-4737-9d22-2af480cda3c7"
    - "712020:764cf448-210c-4e4b-abd0-cfb411693cd3"
    - "712020:d962cf4e-1564-429c-95d3-7a72d12b697c"
  reporter_account_id: "712020:1683110c-d149-4ca7-a0ad-03ed10597e96"
  order_by: created DESC

jql: >-
  (
    project = PAG
  )
  OR
  (
    issuetype IN ("Story","Technical Story","Bug","Sub-task","Dev Bug (Sub-task)")
    AND assignee IN (
      "712020:1683110c-d149-4ca7-a0ad-03ed10597e96",
      "712020:c3a41fa6-5c83-460a-80ca-a50827135ce5",
      "712020:4d3c5575-206d-4737-9d22-2af480cda3c7",
      "712020:764cf448-210c-4e4b-abd0-cfb411693cd3",
      "712020:d962cf4e-1564-429c-95d3-7a72d12b697c"
    )
  )
  OR reporter = "712020:1683110c-d149-4ca7-a0ad-03ed10597e96"
  ORDER BY created DESC
