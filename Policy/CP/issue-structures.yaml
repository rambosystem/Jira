version: 1
# CP issue field structures. Sprint: Jira/assets/CP/sprint-list.yaml. Label: Jira/assets/global/label-list.yaml.

issue_structures:
  Story:
    required_fields:
      - Space
      - Work type
      - Summary
      - Story Type
      - Sprint
      - Assignee
      - Priority
      - Components
      - Labels
      - Client ID
      - Parent
      - UX Review Required?
    optional_fields:
      - Status
      - UX Review Status
      - Story Points
      - Last Response Date
      - Due date
    field_options:
      Story Type:
        - New Feature
        - Improvement
        - API Integration & Enablement
      Priority:
        - Critical
        - Highest
        - High
        - Medium
        - Low
        - Lowest
        - "4.0"
        - "3.0"
        - "2.0"
        - "1.0"
      UX Review Required?:
        - "Yes"
        - "No"
      UX Review Status:
        - Not Needed
        - Pending
        - Reviewed
    field_defaults:
      Story Type: Improvement
      Client ID: "0000"
      UX Review Required?: "No"
      UX Review Status: Not Needed

  Technical Story:
    required_fields:
      - Space
      - Work type
      - Summary
      - Technical Story Type
      - Sprint
      - Assignee
      - Priority
      - Components
      - Labels
      - Client ID
      - Parent
    optional_fields:
      - Status
      - Story Points
      - Due date
    field_options:
      Technical Story Type:
        - Code Quality
        - Architecture
        - Performance & Scalability
        - Security & Compliance
        - Testing & Automation
        - Operations & Configuration
        - Cross-Platform Support / Integration
        - Spike
        - CS Support - Investigation
        - CS Support - Offline Migration
        - UX-Driven
        - Others
      Priority:
        - Critical
        - Highest
        - High
        - Medium
        - Low
        - Lowest
        - "4.0"
        - "3.0"
        - "2.0"
        - "1.0"
    field_defaults:
      Client ID: "0000"

  Epic:
    required_fields:
      - Space
      - Work type
      - Summary
      - Assignee
      - Priority
      - Components
      - Labels
      - Delivery Quarter
    optional_fields:
      - Status
      - Sprint
      - Parent
      - Epic Name
      - Story Points
      - Due date
    field_options:
      Priority:
        - Critical
        - Highest
        - High
        - Medium
        - Low
        - Lowest
        - "4.0"
        - "3.0"
        - "2.0"
        - "1.0"
      Delivery Quarter:
        - Q1
        - Q2
        - Q3
        - Q4
    field_defaults:
      Client ID: "0000"

notes:
  - Based on Jira create screen snapshots provided on 2026-02-28.
  - Field required/optional status can change if Jira screen configuration changes.
  - Epic structure is initialized from current CP Epic usage and should be refined against Jira create-screen required markers when available.
  - Sprint rules: Jira/assets/CP/sprint-list.yaml. Label rules: Jira/assets/global/label-list.yaml.
