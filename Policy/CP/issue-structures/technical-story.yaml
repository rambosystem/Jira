# CP Technical Story issue field structure. Source: get_createmeta.py CP (+ docs/cp-createmeta-fields.md).
# Sprint: Jira/assets/<project>/sprint-list.yaml. Label: Jira/assets/global/label-list.yaml.

issue_type: Technical Story
required_fields:
  - Summary
  - Priority
  - Components
  - Client ID
  - Technical Story Type
optional_fields:
  - Assignee
  - Parent
  - Epic Link
  - Sprint
  - Story Points
  - Description
  - Due date
  - Fix versions
  - Labels
field_options:
  Technical Story Type:
    - Code Quality
    - Architecture
    - Performance & Scalability
    - Security & Compliance
    - Testing & Automation
    - Operations & Configuration
    - Spike
    - APM Optimization
    - Cross-Platform Support / Integration
    - "CS Support – Investigation"
    - "CS Support – Offline Migration"
    - UX-Driven
    - Others
  Priority:
    - "Critical ⚠️️"
    - Highest
    - High
    - Medium
    - Low
    - Lowest
    - "4.0"
    - "3.0"
    - "2.0"
    - "1.0"
field_defaults:
  Client ID: "0000"
