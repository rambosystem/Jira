# CP Story issue field structure. Source: get_createmeta.py CP (+ docs/cp-createmeta-fields.md).
# Sprint: optional when creating for Backlog. Label: Jira/assets/global/label-list.yaml.

issue_type: Story
required_fields:
  - Summary
  - Priority
  - Components
  - Client ID
  - Story Type
  - UX Review Required?
optional_fields:
  - Assignee
  - Parent
  - Epic Link
  - Sprint
  - Story Points
  - Feature Tier
  - Last Response Date
  - UX Review Status
  - Description
  - Due date
  - Fix versions
  - Labels
field_options:
  Story Type:
    - New Feature
    - Improvement
    - API Integration & Enablement
  UX Review Required?:
    - "Yes"
    - "No"
  UX Review Status:
    - Not Needed
    - Pending
    - Reviewed
  Priority:
    - "Critical ⚠️️"
    - Highest
    - High
    - Medium
    - Low
    - Lowest
    - "4.0"
    - "3.0"
    - "2.0"
    - "1.0"
  Feature Tier:
    - Tier 1
    - Tier 2
    - Tier 3
field_defaults:
  Story Type: Improvement
  Client ID: "0000"
  UX Review Required?: "No"
  UX Review Status: Not Needed
