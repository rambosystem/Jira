# CP sprint list. Project implied by path (Jira/config/assets/project/CP/).
# Sprint Calendar implied by path (Jira/config/policy/sprint-calendar.yaml).
# When creating a Sprint, use the full ISO 8601 datetime format to record the start and end times.
# Sprint IDs are cached from Jira Agile API; re-run init_project.py to refresh.

sprint_management:
  board_id: "2770"
  format:
    pattern: "^[0-9]{2}Q[1-4]-Sprint[1-6]-Defenders$"
    template: "<YYQn>-Sprint<1..6>-Defenders"
    example: 26Q1-Sprint6-Defenders
  rules:
    sprints_per_quarter: 6
    team_name: Defenders
    quarter_token: YYQn
  recent_sprints:
    active_quarter: 26Q1
    values:
      - name: 26Q1-Sprint1-Defenders
      - name: 26Q1-Sprint2-Defenders
        id: "9555"
      - name: 26Q1-Sprint3-Defenders
        id: "9556"
      - name: 26Q1-Sprint4-Defenders
        id: "9557"
      - name: 26Q1-Sprint5-Defenders
        id: "9559"
      - name: 26Q1-Sprint6-Defenders
        id: "11448"
      - name: 26Q2-Sprint1-Defenders
        id: "12174"
      - name: 26Q2-Sprint2-Defenders
      - name: 26Q2-Sprint3-Defenders
      - name: 26Q2-Sprint4-Defenders
      - name: 26Q2-Sprint5-Defenders
      - name: 26Q2-Sprint6-Defenders
  notes:
    - Sprint values should follow quarter-based naming.
    - Update the pattern and rules here if team naming changes in future quarters.
    - Sprint IDs without an id field have not yet been created in Jira.
