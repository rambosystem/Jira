# PAG sprint list. Project implied by path (Jira/config/assets/project/PAG/).
# Sprint Calendar implied by path (Jira/config/policy/sprint-calendar.yaml).
# Sprint IDs are cached from Jira Agile API; re-run init_project.py to refresh.

sprint_management:
  board_id: "2910"
  format:
    pattern: "^[0-9]{2}Q[1-4]-Sprint[1-6]-PAG$"
    template: "<YYQn>-Sprint<1..6>-PAG"
    example: 26Q1-Sprint6-PAG
  rules:
    sprints_per_quarter: 6
    team_name: PAG
    quarter_token: YYQn
  recent_sprints:
    active_quarter: 26Q1
    values:
      - name: 26Q1-Sprint1-PAG
        id: "11829"
      - name: 26Q1-Sprint2-PAG
      - name: 26Q1-Sprint3-PAG
      - name: 26Q1-Sprint4-PAG
      - name: 26Q1-Sprint5-PAG
      - name: 26Q1-Sprint6-PAG
  notes:
    - Sprint values follow quarter-based naming for PAG.
    - Update pattern/rules if PAG sprint naming changes.
    - Sprint IDs without an id field have not yet been created in Jira.
