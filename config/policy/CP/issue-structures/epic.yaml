# CP Epic issue field structure. Source: get_createmeta.py CP (+ docs/cp-createmeta-fields.md).
# Label: Jira/config/assets/global/label-list.yaml.

issue_type: Epic
required_fields:
  - Summary
  - Priority
  - Components
  - Delivery Quarter
optional_fields:
  - Assignee
  - Epic Name
  - Epic Link
  - Sprint
  - Story Points
  - Feature Tier
  - CapEx
  - Description
  - Due date
  - Fix versions
  - Labels
  - Parent
field_options:
  Priority:
    - "Critical ⚠️️"
    - Highest
    - High
    - Medium
    - Low
    - Lowest
    - "4.0"
    - "3.0"
    - "2.0"
    - "1.0"
  Delivery Quarter:
    - Q1
    - Q2
    - Q3
    - Q4
  Feature Tier:
    - Tier 1
    - Tier 2
    - Tier 3
  CapEx:
    - Yes
    - No
field_defaults: {}
