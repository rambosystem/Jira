# PAG issue field structures. Aligned with CP createmeta (same schema).
# Source: get_createmeta.py PAG / docs/pag-createmeta-fields.md.
# Sprint: Jira/config/assets/project/PAG/sprint-list.yaml. Label: Jira/config/assets/global/label-list.yaml.

issue_structures:
  Epic:
    required_fields:
      - Summary
      - Priority
      - Components
      - Delivery Quarter
    optional_fields:
      - Assignee
      - Epic Name
      - Epic Link
      - Sprint
      - Story Points
      - Feature Tier
      - CapEx
      - Description
      - Due date
      - Fix versions
      - Labels
      - Parent
    field_options:
      Priority:
        - "Critical ⚠️️"
        - Highest
        - High
        - Medium
        - Low
        - Lowest
        - "4.0"
        - "3.0"
        - "2.0"
        - "1.0"
      Delivery Quarter:
        - Q1
        - Q2
        - Q3
        - Q4
      Feature Tier:
        - Tier 1
        - Tier 2
        - Tier 3
      CapEx:
        - Yes
        - No
    field_defaults: {}

  Story:
    required_fields:
      - Summary
      - Priority
      - Components
      - Client ID
      - Story Type
      - UX Review Required?
    optional_fields:
      - Assignee
      - Parent
      - Epic Link
      - Sprint
      - Story Points
      - Feature Tier
      - Last Response Date
      - UX Review Status
      - Description
      - Due date
      - Fix versions
      - Labels
    field_options:
      Story Type:
        - New Feature
        - Improvement
        - API Integration & Enablement
      UX Review Required?:
        - "Yes"
        - "No"
      UX Review Status:
        - Not Needed
        - Pending
        - Reviewed
      Priority:
        - "Critical ⚠️️"
        - Highest
        - High
        - Medium
        - Low
        - Lowest
        - "4.0"
        - "3.0"
        - "2.0"
        - "1.0"
      Feature Tier:
        - Tier 1
        - Tier 2
        - Tier 3
    field_defaults:
      Story Type: Improvement
      Client ID: "0000"
      UX Review Required?: "No"
      UX Review Status: Not Needed

  Technical Story:
    required_fields:
      - Summary
      - Priority
      - Components
      - Client ID
      - Technical Story Type
    optional_fields:
      - Assignee
      - Parent
      - Epic Link
      - Sprint
      - Story Points
      - Description
      - Due date
      - Fix versions
      - Labels
    field_options:
      Technical Story Type:
        - Code Quality
        - Architecture
        - Performance & Scalability
        - Security & Compliance
        - Testing & Automation
        - Operations & Configuration
        - Spike
        - APM Optimization
        - Cross-Platform Support / Integration
        - "CS Support – Investigation"
        - "CS Support – Offline Migration"
        - UX-Driven
        - Others
      Priority:
        - "Critical ⚠️️"
        - Highest
        - High
        - Medium
        - Low
        - Lowest
        - "4.0"
        - "3.0"
        - "2.0"
        - "1.0"
    field_defaults:
      Client ID: "0000"

notes:
  - PAG has same Jira createmeta as CP; required/optional and field_options aligned with docs/pag-createmeta-fields.md.
  - Sprint is optional (e.g. when creating for Backlog).
