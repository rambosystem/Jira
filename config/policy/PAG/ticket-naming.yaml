# PAG ticket summary/title naming rules. Used by create-story, create-technical-story, create-epic.

naming:
  Epic:
    pattern: "<Module> Upgrade - <YYQn>"
    example: "Pacvue Agent Upgrade - 26Q2"
    description: "Quarterly module epic. Module = component name; YYQn = year-quarter."

  Story:
    pattern: "[模块] - [平台或范围] - [动作 + 对象]"
    enforce: true
    rules:
      module: "Bracketed component name, e.g. [Pacvue Agent]."
      platform_scope: "Use 'All Platforms' or specific platform; multi use slash."
      action_object: "Formal wording; verb-object or domain-subject style."
      avoid: "Colloquial or ambiguous phrases."
    examples:
      - "[Pacvue Agent] - All Platforms - 新功能简述"

  Technical Story:
    inherit: Story

  Bug:
    pattern: "Optional; prefer [模块] - 简短描述 or user summary."
    enforce: false
