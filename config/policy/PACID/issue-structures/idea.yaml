# PACID Idea issue type - createmeta structure (from get_createmeta.py PACID --options).
# Issue type name in Jira: "Idea". No required fields; all fields optional.
#
# Middle Platform 专用约定必填与模板见: idea-middle-platform.yaml

issue_type: Idea
required_fields: []
optional_fields:
  - name: Assignee
    key: assignee
    type: user
  - name: Team
    key: customfield_10001
    type: team
  - name: Start date
    key: customfield_10015
    type: date
  - name: Goals
    key: customfield_10090
    type: array
  - name: Impact
    key: customfield_10267
    type: number
  - name: Teams
    key: customfield_10278
    type: array
    options: [Ads, Commerce, Data, Research, UX, "Pricing & Packaging", RRM]
  - name: Score
    key: customfield_10279
    type: number
  - name: Project start
    key: customfield_10283
    type: string
  - name: Project target
    key: customfield_10284
    type: string
  - name: Effort
    key: customfield_10287
    type: number
  - name: Idea short description
    key: customfield_10288
    type: string
  - name: PRD Document Link
    key: customfield_10290
    type: string
  - name: GTM Feature Tier
    key: customfield_10292
    type: option
    options: [Tier 0, Tier 1, Tier 2, Tier 3, Internal]
  - name: Sizing
    key: customfield_10485
    type: option
    options: [XS, S, M, L, XL, XXL]
  - name: PRD Design Status
    key: customfield_10489
    type: option
    options: [Not Needed, Needed, "In Progress", "In Review", Blocked, Done]
  - name: UX Status
    key: customfield_10490
    type: option
    options: [Not Needed, Needed, "In Progress", "In Review", Blocked, Done]
  - name: Product Feature
    key: customfield_10507
    type: array
    # options: long list - see get_createmeta PACID --options output
  - name: Client Segment
    key: customfield_10508
    type: array
    options: [Helium10, Pacvue]
  - name: UX Design Due Date
    key: customfield_10510
    type: string
  - name: PRD Due Date
    key: customfield_10511
    type: string
  - name: PME Sign Off Due Date
    key: customfield_10512
    type: string
  - name: GTM Ready
    key: customfield_10518
    type: number
  - name: Confidence
    key: customfield_10519
    type: number
  - name: Reach
    key: customfield_10520
    type: number
  - name: RICE Score
    key: customfield_10525
    type: number
  - name: Dependency
    key: customfield_10526
    type: array
    options:
      [
        "Pricing and Packaging",
        "Data Science",
        "Data Collection",
        Research,
        Commerce,
        Data,
        Ads,
        "web crawler",
        UX,
        "AI/ML Team",
        Evangelist,
      ]
  - name: JBP Client Name
    key: customfield_10527
    type: option
    # options: Profitero, MPG, Group M, etc.
  - name: Priority (Idea)
    key: customfield_10533
    type: option
    options: [P0, P1, P2, P3]
  - name: US PM
    key: customfield_10534
    type: array
  - name: Dev Leader
    key: customfield_10548
    type: array
  - name: Release Status
    key: customfield_10726
    type: option
    options: [Discovery, Development, Alpha, Beta, GA, "Product Backlog"]
  - name: UX Designer
    key: customfield_10758
    type: array
  - name: Retailer/Platform
    key: customfield_10791
    type: array
    options:
      [
        "Cross Platform",
        Albertsons,
        Amazon,
        Bol,
        Chewy,
        Citrus,
        Criteo,
        CVS,
        DoorDash,
        eBay,
        "Home Depot",
        Instacart,
        Kroger,
        Loblaws,
        "Mercado Libre",
        Microsoft,
        Rakuten,
        Reddit,
        "Sam's Club",
        Target,
        "The Trade Desk",
        TikTok,
        Walmart,
        Wayfair,
        Ahold,
        Tesco,
      ]
  - name: Idea archived
    key: customfield_10923
    type: option
    options: [Yes]
  - name: Idea archived by
    key: customfield_10924
    type: array
  - name: Idea archived on
    key: customfield_10925
    type: datetime
  - name: Atlassian project
    key: customfield_10926
    type: string
  - name: Atlassian project status
    key: customfield_10927
    type: string
  - name: Amplitude Tracking Status
    key: customfield_11187
    type: option
    options:
      ["Tracking Needed", "Tracking Done", "Review Needed", "Review Done"]
  - name: Amplitude Dashboard
    key: customfield_11550
    type: string
  - name: Figma Link
    key: customfield_11616
    type: string
  - name: Alpha Date
    key: customfield_11649
    type: string
  - name: Beta Date
    key: customfield_11650
    type: string

# Standard Jira fields (Summary, Description, etc.) are in createmeta; Idea has no required custom fields.
