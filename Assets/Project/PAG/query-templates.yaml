# Query templates for PAG board. Substitute placeholders with values from Jira/assets/PAG/team.yaml.

team_board:
  description: "PAG team board: project OR assignee OR reporter"
  jql_template: |
    (
      project = {{project}}
    )
    OR
    (
      issuetype IN ({{issue_types}})
      AND assignee IN ({{assignee_ids}})
    )
    OR reporter = {{reporter_id}}
    {{order}}
  defaults:
    order: "ORDER BY created DESC"

sprint_done_stories:
  description: "Done Stories in a given sprint"
  jql_template: |
    project = {{project}}
    AND issuetype = Story
    AND sprint = "{{sprint_name}}"
    AND statusCategory = Done
    ORDER BY key ASC
