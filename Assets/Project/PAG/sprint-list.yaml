# PAG sprint list. Project implied by path (Jira/assets/PAG/).

sprint_management:
  format:
    pattern: "^[0-9]{2}Q[1-4]-Sprint[1-6]-PAG$"
    template: "<YYQn>-Sprint<1..6>-PAG"
    example: 26Q1-Sprint6-PAG
  rules:
    sprints_per_quarter: 6
    team_name: PAG
    quarter_token: YYQn
  recent_sprints:
    active_quarter: 26Q1
    values:
      - 26Q1-Sprint1-PAG
      - 26Q1-Sprint2-PAG
      - 26Q1-Sprint3-PAG
      - 26Q1-Sprint4-PAG
      - 26Q1-Sprint5-PAG
      - 26Q1-Sprint6-PAG
  notes:
    - Sprint values follow quarter-based naming for PAG.
    - Update pattern/rules if PAG sprint naming changes.
