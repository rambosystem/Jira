# Query templates for CP board. Substitute placeholders with values from Jira/assets/CP/team.yaml
# and, for {{components}}, from Jira/assets/CP/components.yaml when team.yaml has ownership.components_file.
# Placeholders: {{project}}, {{components}}, {{assignee_ids}}, {{reporter_id}}, {{issue_types}}, {{order}}

team_board:
  description: "Defenders team board: project components OR assignee OR reporter"
  jql_template: |
    (
      project = {{project}}
      AND component IN ({{components}})
    )
    OR
    (
      issuetype IN ({{issue_types}})
      AND assignee IN ({{assignee_ids}})
    )
    OR reporter = {{reporter_id}}
    {{order}}
  defaults:
    order: "ORDER BY created DESC"
  # Values: team.yaml (workspace.project.key, team.members, ticketing.*); components from
  # team.yaml ownership.components or from the file in ownership.components_file (e.g. components.yaml).
  # Reporter typically = board owner (e.g. Rambo Wang account_id).

sprint_done_stories:
  description: "Done Stories in a given sprint (for sprint report / release note)"
  jql_template: |
    project = {{project}}
    AND issuetype = Story
    AND sprint = "{{sprint_name}}"
    AND statusCategory = Done
    ORDER BY key ASC
