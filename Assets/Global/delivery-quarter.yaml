# Delivery Quarter: Jira custom field config. Used by create-epic (and other issue types that require it).
# Align with label-list.yaml roadmap labels (roadmap_YYqN).

field_id: customfield_12899

options:
  - Q1
  - Q2
  - Q3
  - Q4

# When setting via jira_create_issue additional_fields:
# {"customfield_12899": {"value": "Q1"}}  (use one of options above)

default_rule: "When user does not specify quarter: use current quarter (e.g. 26Q1 → Q1). Derive from today or from label-list recent_labels."

roadmap_label_alignment: "Delivery Quarter Qn + year (e.g. 26Q1) → labels must include roadmap_26q1 (see label-list.yaml)."
